name: Android CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "codex/**"
      - "feature/**"
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android 36 SDK
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Compile debug Kotlin
        run: ./gradlew --no-daemon compileDebugKotlin

      - name: Run debug unit tests
        run: ./gradlew --no-daemon testDebugUnitTest

      - name: Upload unit test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: poweramp-bridge-unit-test-report
          path: |
            app/build/reports/tests/testDebugUnitTest
            app/build/test-results/testDebugUnitTest
          if-no-files-found: warn

      - name: Restore stable release keystore
        if: github.event_name != 'pull_request'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/poweramp-bridge-release.jks"

      - name: Assemble signed release APK and AAB
        if: github.event_name != 'pull_request'
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/poweramp-bridge-release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew --no-daemon assembleRelease bundleRelease -PappVersionCode=${{ github.run_number }}

      - name: Verify release certificate
        if: github.event_name != 'pull_request'
        run: |
          "$ANDROID_HOME/build-tools/36.0.0/apksigner" verify --verbose --print-certs app/build/outputs/apk/release/app-release.apk

      - name: Upload signed release APK
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: poweramp-bridge-release-apk
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Upload signed release AAB
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: poweramp-bridge-release-aab
          path: app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      - name: Assemble debug APK for pull-request validation
        if: github.event_name == 'pull_request'
        run: ./gradlew --no-daemon assembleDebug

      - name: Upload pull-request debug APK
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: poweramp-bridge-pr-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
